<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mundo Repuestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/formulario.css">

</head>

<body>

    <div class="container d-flex flex-column align-items-center justify-center" style="min-height: 80vh;">
        <header>

            <div class="logo">
                <img src="img/descarga.png" alt="logo" width="100">
            </div>
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="inicio.html">Mundo Repuestos</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="inicio.html">Inicio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="Producto.html">Productos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="contacto.html">Contacto</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

        </header>
        <div class="formulario">
            <h2>Mundo Repuestos</h2>

            <form id="whatsappForm">

                <div class="input-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
                </div>

                <div class="input-group">
                    <label>Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Ingrese su número" required>
                </div>

                <div class="input-group">
                    <label>Producto Solicitado</label>
                    <textarea id="producto" placeholder="Escriba el producto que necesita" required></textarea>
                </div>

                <button type="submit" class="btn">
                    Enviar por WhatsApp
                </button>

            </form>
        </div>
        <script>
            document.getElementById("whatsappForm").addEventListener("submit", function (e) {
                e.preventDefault();

                let nombre = document.getElementById("nombre").value;
                let telefono = document.getElementById("telefono").value;
                let producto = document.getElementById("producto").value;

                let mensaje = `Hola Mundo Repuestos,%0A%0A` +
                    `Nombre: ${nombre}%0A` +
                    `Teléfono: ${telefono}%0A` +
                    `Producto solicitado: ${producto}`;

                // Números
                let numero1 = "573177537993";
                let numero2 = "573187279750";

                // Links
                let url1 = `https://wa.me/${numero1}?text=${mensaje}`;
                let url2 = `https://wa.me/${numero2}?text=${mensaje}`;

                // Abrir chats
                window.open(url1, "_blank");

                setTimeout(() => {
                    window.open(url2, "_blank");
                }, 1000);

            });
        </script>




    </div>






























    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
